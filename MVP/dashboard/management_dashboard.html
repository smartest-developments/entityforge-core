<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quality Dashboard</title>
    <link rel="stylesheet" href="./tabler.min.css">
    <link rel="stylesheet" href="./management_dashboard.css">
  </head>
  <body>
    <div class="page">
      <div class="page-wrapper">
        <div class="page-body">
          <div class="container-xl">
            <div class="row row-cards mb-2">
              <div class="col-12">
                <div class="card controls-card input-records-card">
                  <div class="card-body controls-card-body input-records-card-body">
                    <div class="input-records-label">Input Records</div>
                    <div class="input-records-value" id="inputRecordsValue">n/a</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="row row-cards mb-2">
              <div class="col-12">
                <div class="card controls-card input-records-card">
                  <div class="card-body controls-card-body input-records-card-body">
                    <div class="input-records-label">Full Execution Time (min)</div>
                    <div class="input-records-value" id="executionMinutesValue">n/a</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="row row-cards mb-2" id="comparisonCards">
              <div class="col-12 col-xxl-6">
                <div class="card comparison-card comparison-card-our">
                  <div class="card-header">
                    <h3 class="card-title">Our Metrics</h3>
                  </div>
                  <div class="card-body">
                    <div class="row row-cards" id="ourMetricCards"></div>
                  </div>
                </div>
              </div>
              <div class="col-12 col-xxl-6">
                <div class="card comparison-card">
                  <div class="card-header">
                    <h3 class="card-title">Their Metrics</h3>
                  </div>
                  <div class="card-body">
                    <div class="row row-cards" id="theirMetricCards"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="row row-cards mb-2">
              <div class="col-xl-6">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Our Entity Size Distribution</h3>
                  </div>
                  <div class="card-body chart-md">
                    <canvas id="ourEntitySizeChart"></canvas>
                  </div>
                </div>
              </div>
              <div class="col-xl-6">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Their Entity Size Distribution</h3>
                  </div>
                  <div class="card-body chart-md">
                    <canvas id="theirEntitySizeChart"></canvas>
                  </div>
                </div>
              </div>
            </div>

            <div class="row row-cards mb-2">
              <div class="col-12">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Their Top Match Keys</h3>
                    <div class="match-key-total-wrap">
                      <div class="match-key-total" id="matchKeyTotalValue">
                        <span>Top 10: n/a</span>
                        <span>Total pairs: n/a</span>
                      </div>
                      <span
                        class="match-key-total-info"
                        id="matchKeyTotalInfo"
                        role="button"
                        tabindex="0"
                        data-bs-toggle="tooltip"
                        data-bs-placement="left"
                        data-bs-title="Top 10 pairs are the pairs covered by the 10 keys shown. Total pairs are all unique matched record pairs in this run."
                        title="Top 10 pairs are the pairs covered by the 10 keys shown. Total pairs are all unique matched record pairs in this run."
                        aria-label="Top 10 pairs are the pairs covered by the 10 keys shown. Total pairs are all unique matched record pairs in this run."
                      >i</span>
                    </div>
                  </div>
                  <div class="card-body match-keys-body">
                    <div id="matchKeyList" class="match-key-list"></div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    <script src="./tabler.min.js"></script>
    <script src="./chart.umd.js"></script>
    <script src="./management_dashboard_data.js"></script>
    <script src="./management_dashboard.js"></script>
  </body>
</html>
